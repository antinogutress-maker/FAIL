<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loksewa Exam Hub - Smart Prep</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #ec4899;
            --accent-gk: #0ea5e9;
            --accent-num: #10b981;
            --accent-smart: #f59e0b;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.8);
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Header */
        header {
            position: relative;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%);
            padding: 80px 20px 100px;
            text-align: center;
            color: white;
            clip-path: ellipse(150% 100% at 50% 0%);
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.025em;
            text-shadow: 0 4px 12px rgba(0,0,0,0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out;
        }

        .container {
            max-width: 1100px;
            margin: -40px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        /* Beautiful Floating Filter */
        .filter-wrapper {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .filter-wrapper:focus-within {
            transform: translateY(-2px);
        }

        select {
            width: 100%;
            padding: 16px 24px;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            outline: none;
            appearance: none;
        }

        .filter-wrapper::after {
            content: '✦';
            margin-right: 20px;
            color: var(--primary);
            font-size: 1.2rem;
            pointer-events: none;
        }

        /* Grid and Cards */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .quiz-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            opacity: 0;
            transform: translateY(20px);
        }

        .quiz-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .quiz-card:hover {
            transform: scale(1.03) translateY(-8px);
            box-shadow: 0 25px 30px -10px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-glow);
        }

        .card-accent {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--primary);
        }

        .quiz-icon {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            background: #f1f5f9;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .quiz-card:hover .quiz-icon {
            background: var(--primary);
            color: white;
            transform: rotate(10deg);
        }

        .quiz-info {
            flex: 1;
        }

        .quiz-title {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .quiz-meta {
            font-size: 0.85rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        /* New Badge */
        .new-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--secondary);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Color Coding */
        .smart .card-accent { background: var(--accent-smart); }
        .gk .card-accent { background: var(--accent-gk); }
        .numerical .card-accent { background: var(--accent-num); }

        #status-message {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 24px;
            margin-top: 20px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            header h1 { font-size: 2rem; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Loksewa Exam Hub</h1>
        <p>Your Ultimate Smart Preparation Companion</p>
    </header>

    <div class="container">
        <div class="filter-wrapper">
            <select id="categoryFilter">
                <option value="all">🚀 Explore All Challenges</option>
                <option value="smart">🔥 Daily Smart Mock Series</option>
                <option value="gk">🌍 General Knowledge (GK)</option>
                <option value="numerical">🔢 Numerical Reasoning</option>
            </select>
        </div>

        <div id="status-message">
            <span class="loader"></span>
            <p style="margin-top: 15px; font-weight: 600;">Syncing latest tests...</p>
        </div>

        <div id="quiz-container" class="grid-container" style="display: none;"></div>
    </div>

    <script>
        const GITHUB_OWNER = 'antinogutress-maker'; 
        const GITHUB_REPO = 'SMARTMOCK';        
        const FOLDER_PATH = 'tests'; 
        
        const container = document.getElementById('quiz-container');
        const statusMessage = document.getElementById('status-message');
        const categoryFilter = document.getElementById('categoryFilter');
        let allQuizzes = []; 

        function formatTitle(filename) {
            let name = filename.replace('.html', '');
            
            if(name.toLowerCase().startsWith('gk')) {
                name = name.substring(2);
            } else if (name.toLowerCase().startsWith('smart')) {
                name = name.substring(5);
            }
            
            name = name.replace(/[-_]/g, ' ').trim(); 
            return name.replace(/\b\w/g, char => char.toUpperCase()); 
        }

        async function fetchQuizzes() {
            try {
                // Fetch contents
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`);
                
                if (!response.ok) throw new Error('Could not connect to test server.');

                const files = await response.json();
                let fetchedFiles = files.filter(file => file.name.endsWith('.html'));

                // --- SMART SORTING (NEWEST FIRST) ---
                // We sort based on a combination of natural language sorting and 
                // giving priority to files that look like they have higher versions/dates.
                allQuizzes = fetchedFiles.sort((a, b) => {
                    return b.name.localeCompare(a.name, undefined, { numeric: true, sensitivity: 'base' });
                });

                if (allQuizzes.length === 0) {
                    statusMessage.innerHTML = "<h3>No tests available right now.</h3>";
                    return;
                }

                statusMessage.style.display = 'none';
                container.style.display = 'grid';
                
                renderQuizzes(allQuizzes);

            } catch (error) {
                statusMessage.innerHTML = `<h3 style="color: #ef4444;">Connection Error</h3><p>${error.message}</p>`;
            }
        }

        function renderQuizzes(quizArray) {
            container.innerHTML = ''; 

            quizArray.forEach((file, index) => {
                const nameLower = file.name.toLowerCase();
                const isSmart = nameLower.startsWith('smart');
                const isGk = nameLower.startsWith('gk');
                const isNumerical = !isSmart && !isGk; 
                
                const formattedName = formatTitle(file.name);
                
                const card = document.createElement('a');
                
                // Color Categories
                let categoryType = 'numerical';
                let tag = 'Reasoning';
                if (isSmart) { categoryType = 'smart'; tag = 'Smart Mock'; }
                else if (isGk) { categoryType = 'gk'; tag = 'General Knowledge'; }
                
                card.className = `quiz-card ${categoryType}`;
                card.href = `${FOLDER_PATH}/${file.name}`; 

                // Add "NEW" badge to top 3 items
                const isNew = index < 3;

                card.innerHTML = `
                    <div class="card-accent"></div>
                    ${isNew ? '<span class="new-badge">New</span>' : ''}
                    <div class="quiz-icon">${index + 1}</div>
                    <div class="quiz-info">
                        <div class="quiz-meta">${tag}</div>
                        <div class="quiz-title">${formattedName}</div>
                    </div>
                `;

                container.appendChild(card);
                
                // Staggered animation
                setTimeout(() => {
                    card.classList.add('visible');
                }, index * 60);
            });
        }

        // --- ENHANCED FILTER LOGIC ---
        categoryFilter.addEventListener('change', (e) => {
            const selected = e.target.value;
            
            // Fade out current
            const cards = document.querySelectorAll('.quiz-card');
            cards.forEach(c => c.classList.remove('visible'));

            setTimeout(() => {
                const filteredQuizzes = allQuizzes.filter(file => {
                    const nameLower = file.name.toLowerCase();
                    const isSmart = nameLower.startsWith('smart');
                    const isGk = nameLower.startsWith('gk');
                    const isNumerical = !isSmart && !isGk; 
                    
                    if (selected === 'all') return true;
                    if (selected === 'smart') return isSmart;
                    if (selected === 'gk') return isGk;
                    if (selected === 'numerical') return isNumerical;
                });

                renderQuizzes(filteredQuizzes);

                if (filteredQuizzes.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px; background: white; border-radius: 24px;">
                            <h3 style="color: var(--text-light)">No ${selected.toUpperCase()} tests found in this vault!</h3>
                        </div>`;
                }
            }, 300);
        });

        fetchQuizzes();
    </script>
</body>
</html>
